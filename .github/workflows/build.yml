name: Build and Deploy

on:
  push:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    timeout-minutes: 10
    
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        arch: [amd64, arm64]
        exclude: # arm64 on Windows is not supported, ngapost2md is not supported
          - os: windows-latest
            arch: arm64
        
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Get version
      id: get_version
      run: echo "VERSION=$(git describe --tags --always)" >> $GITHUB_ENV
        
    - name: Build for amd64 on Linux
      if: matrix.arch == 'amd64' && matrix.os != 'windows-latest'
      run: |
        GOARCH=amd64 go build -trimpath -ldflags "-s -w -X main.buildTime=$(date +%Y-%m-%dT%H:%M:%S) -X main.gitHash=${{ env.VERSION }}" -v -o ./build/ngamm-${{ matrix.os }}-amd64-${{ env.VERSION }}

    - name: Build for amd64 on Windows
      if: matrix.arch == 'amd64' && matrix.os == 'windows-latest'
      run: |
        $env:GOARCH="amd64"; $buildTime=(Get-Date -Format "yyyy-MM-ddTHH:mm:ss"); go build -trimpath -ldflags "-s -w -X main.buildTime=$buildTime -X main.gitHash=${{ env.VERSION }}" -v -o ./build/ngamm-${{ matrix.os }}-amd64-${{ env.VERSION }}.exe

    - name: Build for arm64 on Linux
      if: matrix.arch == 'arm64' && matrix.os != 'windows-latest'
      run: |
        GOARCH=arm64 go build -trimpath -ldflags "-s -w -X main.buildTime=$(date +%Y-%m-%dT%H:%M:%S) -X main.gitHash=${{ env.VERSION }}" -v -o ./build/ngamm-${{ matrix.os }}-arm64-${{ env.VERSION }}

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts-${{ matrix.os }}-${{ matrix.arch }}
        path: ./build/

    - name: Build Docker image - ngamm
      if: matrix.arch == 'amd64' && matrix.os != 'windows-latest' && github.ref == 'refs/heads/main'
      run: |
        docker build -t ngamm:${{ env.VERSION }} .

    - name: Build Docker image - ngamm-pan
      if: matrix.arch == 'amd64' && matrix.os != 'windows-latest' && github.ref == 'refs/heads/main'
      run: |
        docker build --build-arg NET_PAN="true" -t ngamm-pan:${{ env.VERSION }} .

    - name: Log in to Docker Hub
      if: matrix.arch == 'amd64' && matrix.os != 'windows-latest' && github.ref == 'refs/heads/main'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Push ngamm to Docker Hub with version tag
      if: matrix.arch == 'amd64' && matrix.os != 'windows-latest' && github.ref == 'refs/heads/main'
      run: |
        docker tag ngamm:${{ env.VERSION }} ${{ secrets.DOCKER_USERNAME }}/ngamm:${{ env.VERSION }}
        docker push ${{ secrets.DOCKER_USERNAME }}/ngamm:${{ env.VERSION }}

    - name: Push ngamm to Docker Hub with latest tag
      if: matrix.arch == 'amd64' && matrix.os != 'windows-latest' && github.ref == 'refs/heads/main'
      run: |
        docker tag ngamm:${{ env.VERSION }} ${{ secrets.DOCKER_USERNAME }}/ngamm:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/ngamm:latest
        
    - name: Push ngamm-pan to Docker Hub with version tag
      if: matrix.arch == 'amd64' && matrix.os != 'windows-latest' && github.ref == 'refs/heads/main'
      run: |
        docker tag ngamm-pan:${{ env.VERSION }} ${{ secrets.DOCKER_USERNAME }}/ngamm-pan:${{ env.VERSION }}
        docker push ${{ secrets.DOCKER_USERNAME }}/ngamm-pan:${{ env.VERSION }}

    - name: Push ngamm-pan to Docker Hub with latest tag
      if: matrix.arch == 'amd64' && matrix.os != 'windows-latest' && github.ref == 'refs/heads/main'
      run: |
        docker tag ngamm-pan:${{ env.VERSION }} ${{ secrets.DOCKER_USERNAME }}/ngamm-pan:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/ngamm-pan:latest

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./artifacts
        
    - name: Get version
      run: echo "VERSION=$(git describe --tags --always)" >> $GITHUB_ENV

    - name: Create zip packages
      run: |
        chmod +x ./package.sh
        ./package.sh ${{ env.VERSION }}

    - name: Generate changelog
      run: |
        # 获取上一个 tag
        PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
        if [ -z "$PREV_TAG" ]; then
          # 如果没有上一个 tag, 只获取最近 5 条提交
          git log -5 --pretty=format:"- %s (%h)" > CHANGELOG.md
        else
          # 获取从上一个 tag 到现在的提交
          git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" > CHANGELOG.md
        fi

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.VERSION }}
        name: Release ${{ env.VERSION }}
        body_path: CHANGELOG.md
        draft: false
        prerelease: false
        files: |
          *.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}